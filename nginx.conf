server {
    listen 80;

    location /api/users {
        proxy_pass http://auth:3000;
    }

    location /api/tickets {
        proxy_pass http://tickets:3000;
    }

    location /api/orders {
        proxy_pass http://orders:3000;
    }

    location /api/payments {
        proxy_pass http://payments:3000;
    }

    location / {
        proxy_pass http://client:3000;
    }
} 
